name: Deploy Hugo site to Pages

on:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

defaults:
  run:
    shell: bash

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      # 1. Configura Node.js (fondamentale per Tailwind CSS v4)
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # 2. Installa Tailwind (se hai un package.json lo installa da lì, altrimenti globalmente)
      - name: Install Tailwind CSS
        run: |
          if [ -f package.json ]; then
            npm install
          else
            npm install -g tailwindcss postcss autoprefixer
          fi

      # 3. Installa l'ultima versione Extended di Hugo (necessaria per Tailwind e Sass)
      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: 'latest' # Usa l'ultima versione per evitare conflitti di compatibilità
          extended: true

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v5

      # 4. Avvia la compilazione in produzione
      - name: Build with Hugo
        env:
          HUGO_CACHEDIR: ${{ runner.temp }}/hugo_cache
          HUGO_ENV: production
        run: |
          hugo \
            --gc \
            --minify \
            --environment production \
            --baseURL "${{ steps.pages.outputs.base_url }}/"

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
