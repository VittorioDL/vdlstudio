{{ define "main" }}
<!-- select-none blocca la selezione nativamente su tutta la finestra -->
<div class="relative w-full h-[100dvh] overflow-hidden bg-background select-none">
    
    <canvas id="landing-canvas" 
            style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 0; opacity: 0.6;">
    </canvas>

    <!-- pointer-events-none: Questo contenitore e tutto ciò che contiene (es. il titolo)
         diventa "trasparente" ai tocchi. I tocchi passano attraverso e muovono l'onda. -->
    <div class="relative z-10 flex flex-col items-center justify-center h-full px-4 text-center pointer-events-none">
        
        <div class="flex flex-col items-start text-xl font-medium">
            
            <!-- TITOLO: Non essendo cliccabile, eredita pointer-events-none. 
                 È fisicamente impossibile selezionarlo. -->
            <h1 class="text-5xl md:text-7xl font-bold tracking-tight text-foreground mb-4">
                {{ .Site.Title }}
            </h1>
            
            <!-- LINK NAVIGAZIONE: Riattiviamo il tocco con pointer-events-auto. 
                 Aggiungiamo outline-none e stili inline per uccidere il flash azzurro del tap. -->
            <a href="{{ "blog/" | relURL }}"
               class="pointer-events-auto select-none outline-none text-foreground hover:text-muted-foreground hover:underline underline-offset-4 decoration-2 transition-all"
               style="-webkit-tap-highlight-color: transparent; -webkit-touch-callout: none;">
                Blog
            </a>

            <a href="{{ "about/" | relURL }}" 
               class="pointer-events-auto select-none outline-none text-foreground hover:text-muted-foreground hover:underline underline-offset-4 decoration-2 transition-all"
               style="-webkit-tap-highlight-color: transparent; -webkit-touch-callout: none;">
                About
            </a>

            <!-- EMAIL: Riattiviamo il tocco e riattiviamo la selezione testuale (select-text). 
                 Il browser gestirà la selezione nativamente col Long Press. -->
            <a href="mailto:{{ .Site.Params.email }}" 
               class="mt-2 pointer-events-auto select-text outline-none text-foreground hover:text-muted-foreground transition-colors font-mono text-base"
               style="-webkit-tap-highlight-color: transparent;">
                {{ .Site.Params.email }}
            </a>

        </div>
    </div>
</div>

<script src="{{ "js/landing-grid.js" | relURL }}"></script>
{{ end }}
